host: localhost:8080
info:
  contact: {}
  description: API do ERP erGus (multi-tenant, categorias, produtos, etc).
  title: erGus API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Autentica o usuário e retorna um token de sessão
      parameters:
      - description: Credenciais de login
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.LoginResponse'
        "400":
          description: JSON inválido ou campos obrigatórios
          schema:
            type: string
        "401":
          description: Usuário ou senha inválidos
          schema:
            type: string
        "405":
          description: Método não permitido
          schema:
            type: string
        "500":
          description: Erro interno ao autenticar
          schema:
            type: string
      summary: Login do usuário
      tags:
      - Auth
  /categories:
    get:
      description: Lista categorias do tenant com paginação e busca opcional por código
        ou nome
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Busca por code exato ou name contendo (case-insensitive)
        in: query
        name: q
        type: string
      - description: Página (default 1)
        in: query
        name: page
        type: integer
      - description: Tamanho da página (default 50, max 200)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/httpapi.Category'
            type: array
        "400":
          description: Tenant inválido
          schema:
            type: string
        "401":
          description: Não autenticado
          schema:
            type: string
        "500":
          description: Erro interno
          schema:
            type: string
      summary: Lista categorias
      tags:
      - Categories
  /categories/{id}:
    delete:
      description: Exclui uma categoria pelo ID dentro do tenant
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: ID da categoria
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Sem conteúdo
          schema:
            type: string
        "400":
          description: Tenant inválido
          schema:
            type: string
        "401":
          description: Não autenticado
          schema:
            type: string
        "404":
          description: Categoria não encontrada
          schema:
            type: string
        "500":
          description: Erro interno
          schema:
            type: string
      summary: Exclui categoria
      tags:
      - Categories
    get:
      description: Retorna uma categoria pelo ID dentro do tenant
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: ID da categoria
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.Category'
        "400":
          description: Tenant inválido
          schema:
            type: string
        "401":
          description: Não autenticado
          schema:
            type: string
        "404":
          description: Categoria não encontrada
          schema:
            type: string
        "500":
          description: Erro interno
          schema:
            type: string
      summary: Busca categoria por ID
      tags:
      - Categories
    put:
      consumes:
      - application/json
      description: Atualiza os campos de uma categoria pelo ID dentro do tenant
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: ID da categoria
        in: path
        name: id
        required: true
        type: string
      - description: Dados para atualização (name obrigatório)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.CategoryUpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.Category'
        "400":
          description: Erro de validação / JSON inválido / tenant inválido
          schema:
            type: string
        "401":
          description: Não autenticado
          schema:
            type: string
        "404":
          description: Categoria não encontrada
          schema:
            type: string
        "500":
          description: Erro interno
          schema:
            type: string
      summary: Atualiza categoria
      tags:
      - Categories
  /categories/by-code:
    get:
      description: 'Retorna uma categoria pelo code (ex: CAT001) dentro do tenant'
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: 'Código da categoria (ex: CAT001)'
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.Category'
        "400":
          description: Parâmetro code obrigatório / tenant inválido
          schema:
            type: string
        "401":
          description: Não autenticado
          schema:
            type: string
        "404":
          description: Categoria não encontrada
          schema:
            type: string
        "500":
          description: Erro interno
          schema:
            type: string
      summary: Busca categoria por código
      tags:
      - Categories
  /categories/duplicate/{id}:
    post:
      description: Duplica uma categoria por ID, gerando novo ID e novo code CAT###
        no mesmo tenant
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: ID da categoria a duplicar
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpapi.Category'
        "400":
          description: ID não informado / tenant inválido
          schema:
            type: string
        "401":
          description: Não autenticado
          schema:
            type: string
        "404":
          description: Categoria não encontrada
          schema:
            type: string
        "500":
          description: Erro interno
          schema:
            type: string
      summary: Duplica categoria
      tags:
      - Categories
  /health:
    get:
      description: Retorna status simples da API erGus
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.HealthResponse'
      summary: Healthcheck da API
      tags:
      - Health
  /lookups/cest:
    get:
      description: Busca CEST por code ou description (mínimo 3 caracteres). Retorna
        até 50 itens.
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Texto para busca (mínimo 3 caracteres)
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/httpapi.CEST'
            type: array
        "401":
          description: Não autenticado
          schema:
            type: string
        "500":
          description: Erro interno
          schema:
            type: string
      summary: Busca CEST (lookup)
      tags:
      - Tax Lookups
  /lookups/ncm:
    get:
      description: Busca NCM por code ou description (mínimo 3 caracteres). Retorna
        até 50 itens.
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Texto para busca (mínimo 3 caracteres)
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/httpapi.NCM'
            type: array
        "401":
          description: Não autenticado
          schema:
            type: string
        "500":
          description: Erro interno
          schema:
            type: string
      summary: Busca NCM (lookup)
      tags:
      - Tax Lookups
  /manufacturers:
    get:
      description: Lista fabricantes do tenant com paginação e busca opcional por
        código ou nome
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Busca por codigo exato ou nome contendo (case-insensitive)
        in: query
        name: q
        type: string
      - description: Página (default 1)
        in: query
        name: page
        type: integer
      - description: Tamanho da página (default 50, max 200)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/httpapi.Manufacturer'
            type: array
        "400":
          description: Tenant inválido
          schema:
            type: string
        "401":
          description: Não autenticado
          schema:
            type: string
        "500":
          description: Erro interno
          schema:
            type: string
      summary: Lista fabricantes
      tags:
      - Manufacturers
    post:
      consumes:
      - application/json
      description: Cria um novo fabricante para o tenant, gerando codigo FAB### automaticamente
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Dados do fabricante (nome, tipo, cidade, uf obrigatórios). ativo
          opcional
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.ManufacturerInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpapi.Manufacturer'
        "400":
          description: Erro de validação / JSON inválido / tenant inválido
          schema:
            type: string
        "401":
          description: Não autenticado
          schema:
            type: string
        "500":
          description: Erro interno
          schema:
            type: string
      summary: Cria fabricante
      tags:
      - Manufacturers
  /manufacturers/{id}:
    delete:
      description: Remove um fabricante pelo ID dentro do tenant
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Tenant ID
        in: header
